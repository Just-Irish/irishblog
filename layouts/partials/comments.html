<div id="remark42"></div>

<script>
var remark_config = {
    host: 'https://comments.insignificantgamer.blog',
    site_id: 'insignificantgamer',
    components: ['embed'],
    theme: 'dark',                    // forced dark, always
    locale: 'en',
    no_footer: true,
    max_shown_comments: 10,
  };
</script>
<script>
  (function(c) {
    for(var i = 0; i < c.length; i++){
      var d = document, s = d.createElement('script');
      s.src = remark_config.host + '/web/' +c[i] + '.js';
      s.defer = true;
      (d.head || d.body).appendChild(s);
    }
  })(remark_config.components || ['embed']);
</script>
