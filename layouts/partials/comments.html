<div id="remark42"></div>

<script>
  var remark_config = {
    host: 'https://comments.insignificantgamer.blog',
    site_id: 'insignificantgamer',
    components: ['embed'],
    locale: 'en',
    no_footer: true,
    max_shown_comments: 10,
  };

  // Function to set theme
  function setRemarkTheme() {
    const isDark = document.documentElement.classList.contains('dark') ||
                   window.matchMedia('(prefers-color-scheme: dark)').matches;
    remark_config.theme = isDark ? 'dark' : 'light';
  }

  // Run immediately
  setRemarkTheme();

  // Optional: re-run if your theme toggle fires a custom event
  // (check your theme's JS — rusty-typewriter might not have 'themechange')
  // window.addEventListener('themechange', setRemarkTheme);
</script>
